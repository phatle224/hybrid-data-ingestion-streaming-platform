name: 'dbt_analytics'
version: '1.0.0'
config-version: 2

# This setting configures which profile to use from profiles.yml
profile: 'dbt_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configure models
models:
  dbt_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    warehouse:
      +materialized: incremental
      +schema: warehouse
    mart:
      +materialized: incremental
      +schema: mart
