version: 2

models:
  # ============================================================================
  # WAREHOUSE — Dimensions
  # ============================================================================
  - name: dim_date
    description: "Dimension thời gian — tĩnh, generate series từ 2020 đến 2030"
    columns:
      - name: date_key
        description: "Surrogate key (YYYYMMDD)"
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null

  - name: dim_customer
    description: "Dimension khách hàng (người mua bảo hiểm / buyer)"
    columns:
      - name: customer_key
        description: "Surrogate key MD5(name, dob, phone)"
        tests:
          - unique
          - not_null
      - name: buyer_name
        tests:
          - not_null
      - name: buyer_age_group
        tests:
          - accepted_values:
              values: ['0-17', '18-35', '36-55', '56+', 'Unknown']

  - name: dim_insured_person
    description: "Dimension người được bảo hiểm — chứa logic decode city, relationship, age_group"
    columns:
      - name: insured_person_key
        description: "Surrogate key MD5(name, dob, phone)"
        tests:
          - unique
          - not_null
      - name: insured_name
        tests:
          - not_null
      - name: insured_age_group
        tests:
          - accepted_values:
              values: ['0-6', '7-17', '18-35', '36-55', '56+', 'Unknown']

  - name: dim_product
    description: "Dimension sản phẩm bảo hiểm — insurance type, program, provider"
    columns:
      - name: product_key
        description: "Surrogate key MD5(type, major, program, provider)"
        tests:
          - unique
          - not_null
      - name: insurance_type
        tests:
          - not_null

  - name: dim_sales_channel
    description: "Dimension kênh bán hàng — company sale name, branch"
    columns:
      - name: channel_key
        description: "Surrogate key MD5(company, branch)"
        tests:
          - unique
          - not_null

  # ============================================================================
  # WAREHOUSE — Facts
  # ============================================================================
  - name: fct_contracts
    description: "Fact hợp đồng bảo hiểm — grain: 1 contract object"
    columns:
      - name: contract_object_id
        description: "Natural key"
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_key
              severity: warn
      - name: insured_person_key
        tests:
          - relationships:
              to: ref('dim_insured_person')
              field: insured_person_key
              severity: warn
      - name: product_key
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_key
              severity: warn
      - name: fee_insurance
        description: "Phí bảo hiểm (VND)"
      - name: source_type
        tests:
          - accepted_values:
              values: ['online', 'offline']

  - name: fct_claims
    description: "Fact bồi thường bảo hiểm — grain: 1 claim"
    columns:
      - name: claim_id
        description: "Natural key"
        tests:
          - unique
          - not_null
      - name: contract_object_id
        tests:
          - not_null
          - relationships:
              to: ref('fct_contracts')
              field: contract_object_id
              severity: warn
      - name: amount_claim
        description: "Số tiền yêu cầu bồi thường"
      - name: compensation_amount
        description: "Số tiền được bồi thường"
      - name: compensation_rate
        description: "Tỉ lệ bồi thường (%)"

  # ============================================================================
  # MART — Data Marts
  # ============================================================================
  - name: dm_profiling_analysis
    description: "Data Mart phân tích hồ sơ bồi thường — JOIN fct_claims + Dimensions"
    columns:
      - name: claim_id
        tests:
          - unique
          - not_null

  - name: dm_contract_summary
    description: "Data Mart tổng hợp hợp đồng — phân tích theo sản phẩm, kênh, khu vực"
    columns:
      - name: contract_object_id
        tests:
          - unique
          - not_null
