services:
  profiling_consumer:
    container_name: cdc_profiling
    build:
      context: ./services
      dockerfile: profiling/Dockerfile
    environment:
      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      CONSUMER_GROUP: profiling-consumer-v1
      TOPIC_PREFIX: staging.staging
      
      # PostgreSQL Database (Staging + Reporting)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: postgres
      
      # Logging
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
    
    volumes:
      - ./logs:/app/logs
    
    networks:
      - cdc-network
    
    restart: always
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cdc-network:
    external: true
