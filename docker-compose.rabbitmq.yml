version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: cdc_rabbitmq
    hostname: cdc-rabbitmq
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /affina
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cdc-network
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq-init:
    image: python:3.11-slim
    container_name: cdc_rabbitmq_setup
    working_dir: /app
    volumes:
      - ./scripts/rabbitmq_setup.py:/app/rabbitmq_setup.py:ro
    environment:
      RABBITMQ_HOST: cdc_rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      RABBITMQ_VHOST: /affina
    command: >
      sh -c "
      pip install --no-cache-dir pika &&
      python rabbitmq_setup.py
      "
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cdc-network
    restart: "no"

  event_publisher:
    build:
      context: ./services/event_publisher
    container_name: cdc_event_publisher
    environment:
      # Timezone Configuration
      TZ: Asia/Ho_Chi_Minh
      # PostgreSQL Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: postgres
      # RabbitMQ Configuration
      RABBITMQ_HOST: cdc_rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      RABBITMQ_VHOST: /affina
      # Polling Configuration
      CHECK_INTERVAL: 30
      BATCH_SIZE: 100
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
    networks:
      - cdc-network
    restart: always

volumes:
  rabbitmq_data:

networks:
  cdc-network:
    external: true
