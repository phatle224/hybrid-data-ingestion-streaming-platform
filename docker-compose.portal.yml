version: '3.8'

services:
  portal_backend:
    build:
      context: ./services/portal_backend
      dockerfile: Dockerfile
    container_name: cdc_portal_backend
    ports:
      - "3011:3011"
    environment:
      - DEBUG=true
      - DB_HOST=${DB_HOST:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_DATABASE:-postgres}
      - DB_PORT=${DB_PORT:-5432}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cdc-network

  portal_frontend:
    build:
      context: ./services/portal_frontend
      dockerfile: Dockerfile
    container_name: cdc_portal_frontend
    ports:
      - "3010:80"
    environment:
      - VITE_API_URL=http://localhost:3011
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cdc-network

networks:
  cdc-network:
    name: cdc-network
    external: true
